# Datei: src/main/resources/application-test.yml
# application-test.yml - IDM Test profile configuration

spring:
  datasource:
    url: jdbc:h2:mem:idm-test-${random.uuid};MODE=MariaDB
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  liquibase:
    enabled: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF

system:
  security:
    cors:
      allowed-origins:
        - http://localhost:5175
      allow-credentials: true
    http:
      permit-all-post-paths:
        - /auth/login
  web:
    fallback-interceptor:
      additional-exclude-path-patterns:
        - /auth/**

idm:
  bootstrap:
    enabled: true
    mode: safe
    base-path: idm/bootstrap-test
    admin-xml: admin-user.xml
    scopes-xml: scopes.xml
    permission-groups-xml: permission-groups.xml
    permissions-xml: permissions.xml
    roles-xml: roles.xml
    role-permission-assignments-xml: role-permission-assignments.xml
    user-role-assignments-xml: user-role-assignments.xml
    admin:
      username: admin
      password: secret

  self:
    scope:
      application-key: IDM
      stage-key: TEST

  security:
    jwt:
      secret: test-secret-32-bytes-minimum-length-123456
      ttl-ms: 3600000
    password-policy:
      minimum-length: 3
    login-protection:
      max-failed-attempts: 5
      lock-duration-seconds: 300