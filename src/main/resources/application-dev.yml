# Datei: src/main/resources/application-dev.yml
# application-dev.yml - IDM Development profile configuration

spring:
  jpa:
    hibernate:
      ddl-auto: create

logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF

system:
  security:
    cors:
      allowed-origins:
        - http://localhost:5175
      allow-credentials: true
    http:
      permit-all-post-paths:
        - /auth/login
  web:
    fallback-interceptor:
      additional-exclude-path-patterns:
        - /auth/**

idm:
  bootstrap:
    enabled: true
    mode: safe
    base-path: idm/bootstrap
    admin-xml: admin-user.xml
    scopes-xml: scopes.xml
    permission-groups-xml: permission-groups.xml
    permissions-xml: permissions.xml
    roles-xml: roles.xml
    role-permission-assignments-xml: role-permission-assignments.xml
    user-role-assignments-xml: user-role-assignments.xml
    admin:
      username: admin
      password: secret
    additional-bundles:
      - name: personnel
        enabled: true
        base-path: idm/bootstrap-bundles/personnel

  self:
    scope:
      application-key: IDM
      stage-key: DEV

  security:
    jwt:
      secret: dev-secret-32-bytes-minimum-length-1234567
      ttl-ms: 3600000
    password-policy:
      minimum-length: 3
    login-protection:
      max-failed-attempts: 5
      lock-duration-seconds: 300